
    <p-menubar [model]="items"></p-menubar>



    <div id="message">
        <h1 id="Response"></h1>
      </div>

    <div class="surface-card  p-4 shadow-2 border-round w-full lg:w-6" style="margin-left: 25%; margin-top:50px ;">

        <div class="text-center mb-5">
 
            <div class="text-900 text-3xl font-medium mb-3">Sign Up</div>
            <span class="text-600 font-medium line-height-3">Already have an account?</span>
            <a href="/" class="font-medium no-underline ml-2 text-blue-500 cursor-pointer">Login</a>
        </div>
    
        <div>
            <label for="firstname" class="block text-900 font-medium mb-2">Firstname</label>
            <input id="firstname" type="text" placeholder="Firstname" pInputText class="w-full mb-3">
            
                      
            <label for="surname" class="block text-900 font-medium mb-2">Surname</label>
            <input id="surname" type="text" placeholder="Surname" pInputText class="w-full mb-3">
            

            <label for="username" class="block text-900 font-medium mb-2">Username</label>
            <input id="username" type="text" placeholder="Username" pInputText class="w-full mb-3">
  
            <label for="email" class="block text-900 font-medium mb-2">Email</label>
            <input id="email" type="text" placeholder="Email" pInputText class="w-full mb-3">
            
            <label for="password" class="block text-900 font-medium mb-2">Password</label>
            <input id="password" type="password" placeholder="Password" pInputText class="w-full mb-3">
            
            <label for="verify-password" class="block text-900 font-medium mb-2">Confirm Password</label>
            <input id="verify-password" type="password" placeholder="Confirm Password" pInputText class="w-full mb-3">
            
          
            
                <label for="Roles" class="block text-900 font-medium mb-2">Roles</label>
                <select class="w-full mb-3" name="Roles" id="role">
                    <option value="Admin">Admin</option>
                    <option value="Customer">Customer</option>
                  </select>
          

    
            <p-button (onClick)="signup()"  label="Sign Up" icon="pi pi-user-plus" />
        </div>
    </div>
